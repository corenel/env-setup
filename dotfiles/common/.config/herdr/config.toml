onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

# [terminal]
# Executable only, not a shell command line.
# default_shell = "zsh"
# shell_mode = "non_login"
# new_cwd = "follow"

[remote]
# Recommended for `herdr --remote HOST`.
# manage_ssh_config = true

[session]
# Requires Herdr's official Claude/Codex integrations to have reported
# native conversation identities.
# resume_agents_on_restore = true

[theme]
name = "gruvbox"
auto_switch = false

[ui]
# sidebar_width = 32
# sidebar_min_width = 22
# sidebar_max_width = 42
# sidebar_collapsed_mode = "compact"
# mobile_width_threshold = 64

# mouse_capture = true
# host_cursor = "auto"
# right_click_passthrough_modifier = "ctrl"
# redraw_on_focus_gained = true
# mouse_scroll_lines = 3

confirm_close = true
# false preserves the "create immediately, auto-name dynamically" feeling.
prompt_new_tab_name = false

pane_borders = true
pane_gaps = false
show_agent_labels_on_pane_borders = true
hide_tab_bar_when_single_tab = false

# "spaces" groups the agent panel by workspace order.
# Use "priority" if blocked/done agents should always rise to the top.
agent_panel_sort = "spaces"

# Gruvbox yellow; this is the Herdr chrome accent, not pane terminal colors.
accent = "#fabd2f"

[ui.toast]
# Equivalent to the supplied tmux configuration's quiet notification policy.
delivery = "off"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = false
position = "bottom-center"

[ui.sound]
enabled = false

[advanced]
# Herdr uses bytes per pane, not tmux's line count.
# 64 MiB is a deliberate high-history profile for agent-heavy panes.
# Reduce to 33554432 or the default 10485760 on memory-constrained hosts.
scrollback_limit_bytes = 67108864

[experimental]
allow_nested = false
kitty_graphics = false

# Security default: do not write pane output, prompts, secrets, or tokens
# into session-history.json across a full Herdr server restart.
pane_history = false

# Safe defaults. macOS CJK users can switch the first and last values to true.
reveal_hidden_cursor_for_cjk_ime = false
cjk_ime_agents = ["claude", "codex"]
cjk_ime_cursor_shape = "steady_bar"
switch_ascii_input_source_in_prefix = false

[keys]
prefix = "ctrl+t"

help = "prefix+?"
# `prefix+s` is reserved below for a stacked split, so Settings moves here.
settings = "prefix+comma"
# Preserve the supplied tmux muscle memory.
reload_config = "prefix+r"
detach = ["prefix+ctrl+d", "prefix+q"]

# Workspace = project/repo/task.
new_workspace = "prefix+shift+n"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
workspace_picker = "prefix+w"
goto = ["prefix+g", "prefix+semicolon", "prefix+double_quote"]

# No-worktree policy. This removes keyboard entry points.
# Herdr 0.7.3 has no global `worktrees.enabled = false` switch; context-menu
# worktree actions remain a UI capability and should be treated as disallowed.
new_worktree = ""
open_worktree = ""
remove_worktree = ""

# Keys used while the persistent navigation surface is open.
navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

previous_workspace = "prefix+ctrl+b"
next_workspace = "prefix+ctrl+f"

# Agent-panel navigation.
previous_agent = "prefix+u"
next_agent = "prefix+d"
focus_agent = "prefix+alt+1..9"
open_notification_target = ""

# Used only by a local client attached through `herdr --remote`.
remote_image_paste = "ctrl+v"

# Tab = former tmux window.
new_tab = "prefix+c"
rename_tab = ["prefix+shift+a", "prefix+shift+t"]
previous_tab = "prefix+ctrl+p"
next_tab = "prefix+ctrl+n"
switch_tab = "prefix+1..9"
# Deliberately unset: global workspace search is safer than shifted-number
# collisions with `prefix+!` (break pane).
switch_workspace = ""
close_tab = "prefix+shift+x"

# Pane labels and scrollback.
rename_pane = "prefix+shift+p"
edit_scrollback = "prefix+e"
copy_mode = ["prefix+[", "prefix+esc", "prefix+enter"]

# Prefix-based fallback navigation always remains available.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

swap_pane_left = "prefix+shift+h"
swap_pane_down = "prefix+shift+j"
swap_pane_up = "prefix+shift+k"
swap_pane_right = "prefix+shift+l"

# Herdr's default prefix+Tab cycles panes. We reserve prefix+Tab for the
# cross-workspace/tab last-pane action and move cycling to o/O.
cycle_pane_next = "prefix+o"
cycle_pane_previous = "prefix+shift+o"
last_pane = ["prefix+tab", "prefix+t"]

# Herdr terminology:
# split_vertical   = side by side / new pane on the right
# split_horizontal = stacked / new pane below
split_vertical = "prefix+v"
split_horizontal = "prefix+s"

close_pane = "prefix+x"
zoom = "prefix+z"
# `prefix+r` is reload, so resize mode moves to R.
resize_mode = "prefix+shift+r"
toggle_sidebar = "prefix+b"

[[keys.command]]
key = "prefix+ctrl+r"
type = "shell"
command = '"$HERDR_BIN_PATH" pane send-keys "$HERDR_ACTIVE_PANE_ID" ctrl+l'
description = "clear the focused pane"

# tmux resized by five cells. Herdr's API resizes by a split-ratio amount;
# 0.05 is the closest stable semantic replacement, not an exact cell count.
[[keys.command]]
key = "prefix+ctrl+h"
type = "shell"
command = '"$HERDR_BIN_PATH" pane resize --pane "$HERDR_ACTIVE_PANE_ID" --direction left --amount 0.05'
description = "resize pane left by about 5%"

[[keys.command]]
key = "prefix+ctrl+j"
type = "shell"
command = '"$HERDR_BIN_PATH" pane resize --pane "$HERDR_ACTIVE_PANE_ID" --direction down --amount 0.05'
description = "resize pane down by about 5%"

[[keys.command]]
key = "prefix+ctrl+k"
type = "shell"
command = '"$HERDR_BIN_PATH" pane resize --pane "$HERDR_ACTIVE_PANE_ID" --direction up --amount 0.05'
description = "resize pane up by about 5%"

[[keys.command]]
key = "prefix+ctrl+l"
type = "shell"
command = '"$HERDR_BIN_PATH" pane resize --pane "$HERDR_ACTIVE_PANE_ID" --direction right --amount 0.05'
description = "resize pane right by about 5%"

# 20% splits from the supplied tmux configuration.
[[keys.command]]
key = "prefix+shift+s"
type = "shell"
command = '"$HERDR_BIN_PATH" pane split "$HERDR_ACTIVE_PANE_ID" --direction down --ratio 0.20 --focus'
description = "split below at 20%"

[[keys.command]]
key = "prefix+shift+v"
type = "shell"
command = '"$HERDR_BIN_PATH" pane split "$HERDR_ACTIVE_PANE_ID" --direction right --ratio 0.20 --focus'
description = "split right at 20%"

# Equivalent to tmux break-pane: preserve the running terminal process and
# move it into a new tab.
[[keys.command]]
key = "prefix+shift+1"
type = "shell"
command = '"$HERDR_BIN_PATH" pane move "$HERDR_ACTIVE_PANE_ID" --new-tab --focus'
description = "break pane into a new tab"

# Interactive replacements for tmux join-pane / send-pane.
# Dependencies: jq and fzf. Install the scripts from this kit into ~/.local/bin.
# [[keys.command]]
# key = ["prefix+©", "prefix+alt+g"]
# type = "pane"
# command = "$HOME/.local/bin/herdr-pane-join"
# description = "join a pane from another tab"

# [[keys.command]]
# key = ["prefix+ß", "prefix+alt+s"]
# type = "pane"
# command = "$HOME/.local/bin/herdr-pane-send"
# description = "send the focused pane to another tab"

# Read-only replacement for the file-tree use case of tmux-sidebar.
# Requires: herdr plugin install smarzban/herdr-file-viewer
[[keys.command]]
key = "prefix+f"
type = "shell"
command = '"$HERDR_BIN_PATH" plugin action invoke open-file-viewer --plugin herdr-file-viewer'
description = "open read-only repository viewer in a split"

[[keys.command]]
key = "prefix+shift+f"
type = "shell"
command = '"$HERDR_BIN_PATH" plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer'
description = "open read-only repository viewer in a tab"

# Vim/Neovim-aware direct Ctrl-h/j/k/l navigation.
# Requires the vim-herdr-navigation plugin and its editor-side configuration.
# Installation:
#   herdr plugin install paulbkim-dev/vim-herdr-navigation
#   herdr plugin action list --plugin vim-herdr-navigation
# Other useful plugins:
#   herdr plugin install rjyo/herdr-window-title-sync
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left across Vim and Herdr"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down across Vim and Herdr"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up across Vim and Herdr"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right across Vim and Herdr"
